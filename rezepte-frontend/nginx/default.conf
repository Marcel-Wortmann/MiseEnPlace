server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Erlaubt größere Image-Uploads
    client_max_body_size 16M;

    # gzip-Kompression: drastisch kleinere Bundles
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml
        font/ttf
        font/otf;

    # API-Anfragen ans Backend weiterreichen
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      60s;
    }

    # PWA-Manifest und Icons: kurzes Cache mit Revalidierung,
    # damit App-Icon-Updates beim nächsten Besuch greifen
    location ~* (manifest\.webmanifest|favicon\.svg|icon-.*\.png|apple-touch-icon.*\.png)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Statische Assets aggressiv cachen (Angular hashet Dateinamen automatisch)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-Fallback: alle nicht-API-Routen → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
