<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Mise en Place</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#25201c" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MiseEnPlace" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <app-root></app-root>
    <script>
      // Alten Service Worker entfernen (war früher aktiv, jetzt nicht mehr).
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((r) => r.unregister());
        });
        if (window.caches) {
          caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
        }
      }
    </script>
  </body>
</html>
