<header class="bg-page">
  <div class="max-w-3xl mx-auto px-4 pt-4 pb-2 flex items-center gap-3">
    <div class="w-10 h-10 rounded-2xl bg-card shadow-card flex items-center justify-center shrink-0">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-ink" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z" />
        <line x1="6" y1="17" x2="18" y2="17" />
      </svg>
    </div>
    <h1 class="brand-title flex-1 truncate" aria-label="Mise en Place">
      <span class="brand-main">Mise</span>
      <span class="brand-sub">en place</span>
    </h1>

    <a routerLink="/einkaufsliste" class="icon-btn-tan relative" aria-label="Einkaufsliste">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      @if (shopping.pendingCount() > 0) {
        <span style="position: absolute; top: -2px; right: -2px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9999px; background: var(--color-page); color: var(--color-accent); font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; justify-content: center; border: 1px solid var(--color-accent);">{{ shopping.pendingCount() }}</span>
      }
    </a>

    <button type="button" (click)="navigateToCreate()" class="icon-btn-tan" aria-label="Neu anlegen">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14" />
        <path d="M5 12h14" />
      </svg>
    </button>

    <button type="button" (click)="toggleMenu()"
            class="w-10 h-10 rounded-2xl bg-card shadow-card flex items-center justify-center text-ink font-bold shrink-0"
            aria-label="Menü">
      {{ initial() }}
    </button>
  </div>

  <nav #tabNav class="max-w-3xl mx-auto px-4 pb-2 flex items-center gap-6 overflow-x-auto whitespace-nowrap no-scrollbar">
    <a routerLink="/rezepte" class="tab-link"
       [class.tab-active]="isRecipesTab()"
       [class.tab-inactive]="!isRecipesTab()">Rezepte</a>
    <a routerLink="/plan" class="tab-link"
       [class.tab-active]="isPlanTab()"
       [class.tab-inactive]="!isPlanTab()">Plan</a>
    <a routerLink="/ideen" class="tab-link"
       [class.tab-active]="isIdeasTab()"
       [class.tab-inactive]="!isIdeasTab()">Ideen</a>
    <a routerLink="/vorrat" class="tab-link"
       [class.tab-active]="isVorratTab()"
       [class.tab-inactive]="!isVorratTab()">Vorrat</a>
    <a routerLink="/wein" class="tab-link"
       [class.tab-active]="isWinesTab()"
       [class.tab-inactive]="!isWinesTab()">Wein</a>
    <a routerLink="/restaurants" class="tab-link"
       [class.tab-active]="isRestaurantsTab()"
       [class.tab-inactive]="!isRestaurantsTab()">Restaurants</a>
    <a routerLink="/gefolgt" class="tab-link"
       [class.tab-active]="isFollowTab()"
       [class.tab-inactive]="!isFollowTab()">Gefolgt</a>
  </nav>
</header>

@if (menuOpen()) {
  <div class="fixed inset-0 z-50 flex items-start justify-end pt-20 pr-4">
    <div class="absolute inset-0" (click)="closeMenu()"></div>
    <div class="relative bg-card rounded-2xl shadow-xl w-64 p-2 space-y-1">
      @if (auth.user(); as u) {
        <div class="px-3 py-2 border-b border-divider">
          @if (u.displayName) {
            <p class="font-semibold text-ink truncate">{{ u.displayName }}</p>
          }
          <p class="text-xs text-ink-muted truncate">{{ u.email }}</p>
        </div>
      }
      <a routerLink="/einstellungen" (click)="closeMenu()"
         class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-accent-softer text-ink">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        Einstellungen
      </a>
      <button type="button" (click)="logout()"
              class="w-full flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-accent-softer text-ink text-left">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Abmelden
      </button>
    </div>
  </div>
}
