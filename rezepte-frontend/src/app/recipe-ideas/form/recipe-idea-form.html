<div class="space-y-4 pb-4">
  <h2 class="text-center text-base font-bold text-ink py-2 border-b border-divider">
    {{ isEditMode() ? 'Idee bearbeiten' : 'Neue Idee' }}
  </h2>

  <div class="space-y-3">
    @if (imageUrl(); as url) {
      <div class="relative rounded-3xl overflow-hidden">
        <img loading="lazy" decoding="async" [src]="url" alt="Vorschau" class="w-full h-64 object-cover" />
        <button
          type="button"
          (click)="removeImage()"
          class="absolute top-3 right-3 w-10 h-10 rounded-full bg-card/95 flex items-center justify-center text-ink-soft hover:text-danger transition-colors"
          aria-label="Foto entfernen"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    } @else {
      <label class="block rounded-3xl border-2 border-dashed border-divider h-64 flex flex-col items-center justify-center cursor-pointer transition-colors hover:border-accent hover:bg-accent-softer">
        @if (isUploading()) {
          <svg class="animate-spin text-accent" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
          </svg>
        } @else {
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
        }
        <input autocomplete="off" type="file" accept="image/jpeg,image/png,image/webp" (change)="onFileSelected($event)" class="hidden" [disabled]="isUploading()" />
      </label>
    }

    <div class="flex items-center gap-3">
      <label class="px-4 py-2 rounded-full bg-accent-softer text-accent font-semibold text-sm cursor-pointer transition-colors hover:bg-accent-soft">
        Datei auswählen
        <input autocomplete="off" type="file" accept="image/jpeg,image/png,image/webp" (change)="onFileSelected($event)" class="hidden" [disabled]="isUploading()" />
      </label>
      <span class="text-sm text-ink-muted">{{ imagePath() ? 'Datei ausgewählt' : 'Keine ausgewählt' }}</span>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="submitForm()" class="space-y-4">
    <div class="card-soft p-6 space-y-5">
      <div class="space-y-1">
        <label class="section-label">Titel</label>
        <input
          type="text"
          formControlName="title"
          placeholder="z.B. Tom Yum aus dem Restaurant"
          class="input-underline text-lg"
        />
      </div>

      <div class="space-y-1">
        <label class="section-label">Notiz</label>
        <textarea
          formControlName="note"
          rows="8"
          placeholder="Was möchtest du dir merken?"
          class="input-underline resize-none"
        ></textarea>
      </div>
    </div>
  </form>

  <p class="text-xs text-ink-muted text-center px-4">
    Mindestens eines von Titel, Notiz oder Foto angeben.
  </p>
</div>

<div class="floating-action-pill">
  <button type="button" (click)="cancel()" class="pill-icon-only" aria-label="Abbrechen" title="Abbrechen">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18" />
      <line x1="6" y1="6" x2="18" y2="18" />
    </svg>
  </button>
  <span class="pill-divider"></span>
  <button type="button" (click)="submitForm()" [disabled]="isLoading()" class="pill-primary">
    @if (isLoading()) {
      <svg class="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
      </svg>
    } @else {
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    }
    Speichern
  </button>
</div>
