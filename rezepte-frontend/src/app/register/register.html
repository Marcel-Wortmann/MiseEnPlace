<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-sm space-y-6">
    <div class="text-center space-y-3">
      <div class="w-16 h-16 mx-auto rounded-2xl bg-card shadow-card flex items-center justify-center">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-ink" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z" />
          <line x1="6" y1="17" x2="18" y2="17" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-ink">Konto erstellen</h1>
      <p class="text-sm text-ink-muted">Sammle Rezepte, Ideen und Weine — und teile sie mit anderen.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="card-soft p-6 space-y-5">
      <div class="space-y-1">
        <label class="text-xs text-ink-muted">Benutzername</label>
        <input type="text" autocomplete="username" formControlName="username" placeholder="z.B. max123" class="input-underline" />
        <p class="text-xs text-ink-muted">Eindeutig. Nur a-z, 0-9, _ und -.</p>
      </div>

      <div class="space-y-1">
        <label class="text-xs text-ink-muted">Anzeigename (optional)</label>
        <input type="text" autocomplete="name" formControlName="displayName" placeholder="Wie soll man dich nennen?" class="input-underline" />
      </div>

      <div class="space-y-1">
        <label class="text-xs text-ink-muted">E-Mail</label>
        <input type="email" autocomplete="email" formControlName="email" placeholder="du@beispiel.de" class="input-underline" />
      </div>

      <div class="space-y-1">
        <label class="text-xs text-ink-muted">Passwort</label>
        <input type="password" autocomplete="new-password" formControlName="password" placeholder="Mindestens 8 Zeichen" class="input-underline" />
      </div>

      <button type="submit" [disabled]="loading()" class="btn-primary w-full">
        @if (loading()) {
          <svg class="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
          </svg>
        }
        Registrieren
      </button>
    </form>

    <p class="text-center text-sm text-ink-muted">
      Bereits registriert?
      <a routerLink="/login" class="btn-link">Anmelden</a>
    </p>
  </div>
</div>
