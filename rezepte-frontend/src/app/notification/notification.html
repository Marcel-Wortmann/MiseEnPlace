@if (store.hasItems()) {
  <div class="fixed bottom-24 right-4 z-50 flex flex-col gap-2 max-w-sm pointer-events-none">
    @for (n of store.items(); track n.id) {
      <div class="card-soft p-4 flex items-center gap-3 pointer-events-auto">
        @switch (n.type) {
          @case ('success') {
            <div class="w-9 h-9 rounded-xl bg-success-soft flex items-center justify-center shrink-0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgb(22, 163, 74)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </div>
          }
          @case ('error') {
            <div class="w-9 h-9 rounded-xl bg-danger-soft flex items-center justify-center shrink-0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgb(220, 38, 38)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </div>
          }
          @default {
            <div class="w-9 h-9 rounded-xl bg-accent-softer flex items-center justify-center shrink-0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c9a57c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
              </svg>
            </div>
          }
        }
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-ink text-sm">{{ n.title }}</p>
          @if (n.message) {
            <p class="text-xs text-ink-muted mt-0.5">{{ n.message }}</p>
          }
        </div>
        <button type="button" (click)="store.dismiss(n.id)" class="icon-btn-mini" style="width: 1.5rem; height: 1.5rem;" aria-label="Schließen">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    }
  </div>
}
